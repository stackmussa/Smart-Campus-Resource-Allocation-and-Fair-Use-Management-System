<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SCRAFMS – Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>SCRAFMS</h1><p>Student Portal</p></div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title" id="page-title">Dashboard</span>
      <div class="topbar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name" style="font-size:14px;font-weight:500;">Loading…</span>
        <button class="btn btn-secondary btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </header>
    <main class="content-area" id="content-area">
      <div style="display:flex;align-items:center;justify-content:center;height:300px;">
        <div style="width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      </div>
    </main>
  </div>
</div>
<script src="/js/shared.js"></script>
<script>
var currentUser = null;
var checkInInterval = null;
var selRoom = null, selSlot = null;
var wlSelRoom = null, wlSelSlot = null;
var currentPage = '';

var NAV = [
  {id:'dashboard',     icon:'house',              label:'Dashboard'},
  {id:'request-room',  icon:'calendar-plus',      label:'Request Room'},
  {id:'my-bookings',   icon:'calendar-check',     label:'My Bookings'},
  {id:'check-in',      icon:'geo-alt',            label:'Check In'},
  {id:'waiting-list',  icon:'clock-history',      label:'Waiting List'},
  {id:'my-penalties',  icon:'exclamation-triangle',label:'My Penalties'}
];
var TITLES = {
  'dashboard':'Dashboard','request-room':'Request a Room',
  'my-bookings':'My Bookings','check-in':'Check In',
  'waiting-list':'Waiting List','my-penalties':'My Penalties & Fairness'
};

(async function init(){
  currentUser = await checkAuth('STUDENT');
  if (!currentUser) return;
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
  document.getElementById('sidebar-nav').innerHTML = NAV.map(function(n){
    return '<div class="nav-item" data-page="'+n.id+'" onclick="loadPage(\''+n.id+'\')"><i class="bi bi-'+n.icon+'"></i><span>'+n.label+'</span></div>';
  }).join('');
  loadPage('dashboard');
})();

function loadPage(id) {
  if (checkInInterval) { clearInterval(checkInInterval); checkInInterval = null; }
  currentPage = id;
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active', el.dataset.page === id);
  });
  document.getElementById('page-title').textContent = TITLES[id] || id;
  switch(id){
    case 'dashboard':    renderDashboard();    break;
    case 'request-room': renderRequestRoom();  break;
    case 'my-bookings':  renderMyBookings();   break;
    case 'check-in':     renderCheckIn();      break;
    case 'waiting-list': renderWaitingList();  break;
    case 'my-penalties': renderMyPenalties();  break;
  }
}

function ca(html){ document.getElementById('content-area').innerHTML = html; }

/* ─── DASHBOARD ─── */
async function renderDashboard() {
  ca('<div style="display:flex;align-items:center;justify-content:center;height:200px;"><div style="width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>');
  try {
    var user = await apiFetch('/auth/me');
    var bookings = [], queue = [];
    try { bookings = await apiFetch('/bookings/history'); } catch(e){}
    try { queue    = await apiFetch('/queue'); } catch(e){}
    var confirmed = bookings.filter(function(b){ return b.status==='CONFIRMED'; });
    var recent    = bookings.slice(0, 5);
    var rows = recent.length === 0
      ? '<tr><td colspan="4"><div class="empty-state" style="padding:30px"><i class="bi bi-calendar-x"></i><p>No bookings yet</p><button class="btn btn-primary btn-sm" onclick="loadPage(\'request-room\')"><i class="bi bi-plus"></i> Request a Room</button></div></td></tr>'
      : recent.map(function(b){
          var canCancel = b.status==='CONFIRMED'||b.status==='PENDING';
          return '<tr><td>'+escHtml(b.roomName||b.roomId)+'</td><td>'+formatDateTime(b.startTime)+'</td><td>'+statusBadge(b.status)+'</td><td>'+(canCancel?'<button class="btn btn-danger btn-sm" onclick="cancelBooking(\''+b.bookingId+'\')">Cancel</button>':'<span style="color:#94a3b8">—</span>')+'</td></tr>';
        }).join('');
    ca('<div class="stats-grid">'
      +'<div class="stat-card"><div class="stat-icon" style="background:#eff6ff">'+circularProgress(user.fairnessScore,100,60)+'</div><div><div class="stat-value">'+Math.round(user.fairnessScore)+'</div><div class="stat-label">Fairness Score</div></div></div>'
      +'<div class="stat-card"><div class="stat-icon" style="background:#f0fdf4;color:#22c55e"><i class="bi bi-calendar-check" style="font-size:22px"></i></div><div><div class="stat-value">'+confirmed.length+'</div><div class="stat-label">Active Bookings</div></div></div>'
      +'<div class="stat-card"><div class="stat-icon" style="background:#eff6ff;color:#4f8ef7"><i class="bi bi-clock-history" style="font-size:22px"></i></div><div><div class="stat-value">'+queue.length+'</div><div class="stat-label">Queue Positions</div></div></div>'
      +'<div class="stat-card"><div class="stat-icon" style="background:#fef2f2;color:#ef4444"><i class="bi bi-exclamation-triangle" style="font-size:22px"></i></div><div><div class="stat-value">'+user.noShowCount+'</div><div class="stat-label">No-Shows</div></div></div>'
      +'</div>'
      +'<div class="card"><div class="card-header"><span class="card-title">Recent Bookings</span><button class="btn btn-primary btn-sm" onclick="loadPage(\'my-bookings\')">View All</button></div>'
      +'<div class="table-wrapper"><table><thead><tr><th>Room</th><th>Date & Time</th><th>Status</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>');
  } catch(e){ ca('<div class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> '+escHtml(e.message)+'</div>'); }
}

/* ─── REQUEST ROOM ─── */
function renderRequestRoom() {
  selRoom = null; selSlot = null;
  ca('<div class="two-panel">'
    +'<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-building"></i> Select a Room</span></div>'
    +'<div class="table-wrapper" id="rooms-table"><div style="text-align:center;padding:30px;color:#94a3b8"><div style="width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div></div></div></div>'
    +'<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-clock"></i> Select Time Slot</span></div>'
    +'<div id="slots-panel"><div class="empty-state" style="padding:30px"><i class="bi bi-arrow-left-circle"></i><p>Select a room first</p></div></div></div>'
    +'</div>'
    +'<div class="card" id="action-card"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">'
    +'<div id="selection-info" style="color:#64748b;font-size:14px;">No room or slot selected yet.</div>'
    +'<button class="btn btn-primary" id="req-btn" disabled onclick="doRequestRoom()"><i class="bi bi-calendar-plus"></i> Request Room</button>'
    +'</div><div id="req-result" style="margin-top:0"></div></div>');
  loadRoomsForRequest();
}

async function loadRoomsForRequest() {
  try {
    var rooms = await apiFetch('/rooms');
    var available = rooms.filter(function(r){ return r.status === 'AVAILABLE'; });
    var tbl = available.length === 0
      ? '<div class="empty-state"><i class="bi bi-building-x"></i><p>No available rooms</p></div>'
      : '<table><thead><tr><th>Name</th><th>Building</th><th>Capacity</th></tr></thead><tbody>'
        + available.map(function(r){
            return '<tr onclick="selectRoomReq(\''+r.roomId+'\',\''+escHtml(r.name)+'\',this)" style="cursor:pointer">'
              +'<td><i class="bi bi-building" style="color:#4f8ef7;margin-right:6px"></i>'+escHtml(r.name)+'</td>'
              +'<td>'+escHtml(r.building)+'</td><td>'+r.capacity+'</td></tr>';
          }).join('')
        + '</tbody></table>';
    document.getElementById('rooms-table').innerHTML = tbl;
  } catch(e){ document.getElementById('rooms-table').innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>'; }
}

function selectRoomReq(roomId, roomName, row) {
  selRoom = {id: roomId, name: roomName};
  selSlot = null;
  document.querySelectorAll('#rooms-table tr').forEach(function(r){ r.classList.remove('selected'); });
  row.classList.add('selected');
  updateReqInfo();
  document.getElementById('req-result').innerHTML = '';
  loadSlotsForRequest(roomId);
}

async function loadSlotsForRequest(roomId) {
  document.getElementById('slots-panel').innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8"><div style="width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div></div>';
  try {
    var slots = await apiFetch('/rooms/'+roomId+'/slots');
    var avail = slots.filter(function(s){ return s.isAvailable; });
    if (avail.length === 0) {
      document.getElementById('slots-panel').innerHTML = '<div class="empty-state" style="padding:30px"><i class="bi bi-calendar-x"></i><p>No available time slots</p></div>'; return;
    }
    document.getElementById('slots-panel').innerHTML = '<table><thead><tr><th>Date</th><th>Start</th><th>End</th></tr></thead><tbody>'
      + avail.map(function(s){
          return '<tr onclick="selectSlotReq(\''+s.slotId+'\',this,\''+s.startTime+'\',\''+s.endTime+'\')" style="cursor:pointer">'
            +'<td>'+formatDate(s.startTime)+'</td><td>'+formatTime(s.startTime)+'</td><td>'+formatTime(s.endTime)+'</td></tr>';
        }).join('')
      + '</tbody></table>';
  } catch(e){ document.getElementById('slots-panel').innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>'; }
}

function selectSlotReq(slotId, row, start, end) {
  selSlot = {id: slotId, start: start, end: end};
  document.querySelectorAll('#slots-panel tr').forEach(function(r){ r.classList.remove('selected'); });
  row.classList.add('selected');
  updateReqInfo();
}

function updateReqInfo() {
  var info = document.getElementById('selection-info');
  var btn  = document.getElementById('req-btn');
  if (selRoom && selSlot) {
    info.innerHTML = '<i class="bi bi-check-circle" style="color:#22c55e"></i> <strong>'+escHtml(selRoom.name)+'</strong> · '+formatDateTime(selSlot.start)+' – '+formatTime(selSlot.end);
    btn.disabled = false;
  } else if (selRoom) {
    info.innerHTML = '<i class="bi bi-check-circle" style="color:#22c55e"></i> <strong>'+escHtml(selRoom.name)+'</strong> selected — now pick a time slot';
    btn.disabled = true;
  } else {
    info.textContent = 'No room or slot selected yet.'; btn.disabled = true;
  }
}

async function doRequestRoom() {
  var btn = document.getElementById('req-btn');
  btn.disabled = true; btn.textContent = 'Requesting…';
  document.getElementById('req-result').innerHTML = '';
  try {
    var result = await apiFetch('/bookings/request', {method:'POST', body: JSON.stringify({roomId: selRoom.id, slotId: selSlot.id})});
    var card = '';
    if (result.status === 'CONFIRMED')
      card = '<div class="result-card success"><i class="bi bi-check-circle-fill"></i><div><div class="result-title">Booking Confirmed!</div><div class="result-msg">Your room has been reserved.</div></div></div>';
    else if (result.status === 'QUEUED')
      card = '<div class="result-card info"><i class="bi bi-clock-fill"></i><div><div class="result-title">Added to Queue</div><div class="result-msg">'+escHtml(result.message||'You are in the waiting queue.')+'</div></div></div>';
    else if (result.status === 'RESTRICTED')
      card = '<div class="result-card danger"><i class="bi bi-slash-circle"></i><div><div class="result-title">Account Restricted</div><div class="result-msg">Your account is currently restricted from making bookings.</div></div></div>';
    else if (result.status === 'EXAM_BLOCKED')
      card = '<div class="result-card warning"><i class="bi bi-mortarboard"></i><div><div class="result-title">Exam Mode Active</div><div class="result-msg">Bookings are blocked during exam mode.</div></div></div>';
    else if (result.status === 'ALREADY_BOOKED')
      card = '<div style="background:#fefce8;border:1px solid #eab308;border-radius:12px;padding:20px;text-align:center;"><div style="font-size:32px;">📅</div><div style="color:#854d0e;font-size:18px;font-weight:700;margin:8px 0;">Already Booked</div><div style="color:#713f12;">You already have a booking for this time slot.</div></div>';
    else
      card = '<div class="result-card danger"><i class="bi bi-x-circle"></i><div><div class="result-title">Request Failed</div><div class="result-msg">'+escHtml(result.message||'Unknown error')+'</div></div></div>';
    document.getElementById('req-result').style.marginTop = '16px';
    document.getElementById('req-result').innerHTML = card;
    selSlot = null; btn.disabled = true;
  } catch(e){
    document.getElementById('req-result').style.marginTop = '16px';
    document.getElementById('req-result').innerHTML = '<div class="result-card danger"><i class="bi bi-x-circle"></i><div><div class="result-title">Error</div><div class="result-msg">'+escHtml(e.message)+'</div></div></div>';
    btn.disabled = false;
  }
  btn.innerHTML = '<i class="bi bi-calendar-plus"></i> Request Room';
}

/* ─── MY BOOKINGS ─── */
async function renderMyBookings() {
  ca('<div style="display:flex;align-items:center;justify-content:center;height:200px;"><div style="width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>');
  try {
    var bookings = await apiFetch('/bookings/history');
    if (bookings.length === 0) {
      ca('<div class="card"><div class="empty-state"><i class="bi bi-calendar-x"></i><p>No bookings yet. Request a room to get started.</p><button class="btn btn-primary" onclick="loadPage(\'request-room\')"><i class="bi bi-plus"></i> Request a Room</button></div></div>'); return;
    }
    var rows = bookings.map(function(b){
      var canCancel = b.status==='CONFIRMED'||b.status==='PENDING';
      return '<tr><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+b.bookingId+'">'+b.bookingId.substring(0,8)+'…</td>'
        +'<td>'+escHtml(b.roomName||b.roomId)+'</td>'
        +'<td>'+formatDateTime(b.startTime)+'</td>'
        +'<td>'+formatTime(b.endTime)+'</td>'
        +'<td>'+statusBadge(b.status)+'</td>'
        +'<td>'+(canCancel?'<button class="btn btn-danger btn-sm" onclick="cancelBooking(\''+b.bookingId+'\')">Cancel</button>':'—')+'</td></tr>';
    }).join('');
    ca('<div class="card"><div class="card-header"><span class="card-title">All Bookings ('+bookings.length+')</span></div>'
      +'<div class="table-wrapper"><table><thead><tr><th>Booking ID</th><th>Room</th><th>Start Time</th><th>End Time</th><th>Status</th><th>Action</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div></div>');
  } catch(e){ ca('<div class="alert alert-danger">'+escHtml(e.message)+'</div>'); }
}

async function cancelBooking(id) {
  if (!confirm('Cancel this booking?')) return;
  try {
    await apiFetch('/bookings/'+id, {method:'DELETE'});
    showToast('Booking cancelled successfully','success');
    if (currentPage === 'dashboard') renderDashboard();
    else renderMyBookings();
  } catch(e){ showToast(e.message,'error'); }
}

/* ─── CHECK IN ─── */
async function renderCheckIn() {
  ca('<div class="card" style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:12px"><i class="bi bi-info-circle-fill" style="color:#4f8ef7;font-size:20px"></i><span style="font-size:14px;color:#475569">You can check in starting <strong>15 minutes before</strong> your booking start time, up to 60 minutes after.</span></div></div>'
    +'<div class="card"><div class="card-header"><span class="card-title">Available for Check-In</span><button class="btn btn-secondary btn-sm" onclick="renderCheckIn()"><i class="bi bi-arrow-clockwise"></i> Refresh</button></div>'
    +'<div id="checkin-body"><div style="text-align:center;padding:30px"><div style="width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div></div></div></div>');
  loadCheckInData();
  checkInInterval = setInterval(loadCheckInData, 30000);
}

async function loadCheckInData() {
  if (currentPage !== 'check-in') return;
  try {
    var bookings = await apiFetch('/checkin/available');
    if (bookings.length === 0) {
      document.getElementById('checkin-body').innerHTML = '<div class="empty-state"><i class="bi bi-geo-alt"></i><p>No bookings available for check-in right now</p></div>'; return;
    }
    var now = new Date();
    var rows = bookings.map(function(b){
      var start = new Date(b.startTime);
      var diff = Math.round((start - now)/60000);
      var countHtml, countClass;
      if (diff > 10)      { countHtml = 'In '+diff+' min';     countClass = 'countdown-green'; }
      else if (diff >= 0) { countHtml = 'In '+diff+' min';     countClass = 'countdown-yellow'; }
      else if (diff > -60){ countHtml = Math.abs(diff)+' min ago'; countClass = 'countdown-red'; }
      else                { countHtml = 'Expired';              countClass = ''; }
      return '<tr id="ci-row-'+b.bookingId+'">'
        +'<td>'+escHtml(b.roomName||'Room')+'</td>'
        +'<td>'+formatDateTime(b.startTime)+'</td>'
        +'<td class="'+countClass+'">'+countHtml+'</td>'
        +'<td><button class="btn btn-success btn-sm" id="ci-btn-'+b.bookingId+'" onclick="doCheckIn(\''+b.bookingId+'\')"><i class="bi bi-geo-alt-fill"></i> Check In</button></td></tr>';
    }).join('');
    document.getElementById('checkin-body').innerHTML = '<div class="table-wrapper"><table><thead><tr><th>Room</th><th>Start Time</th><th>Time Remaining</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  } catch(e){ if(document.getElementById('checkin-body')) document.getElementById('checkin-body').innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>'; }
}

async function doCheckIn(bookingId) {
  var btn = document.getElementById('ci-btn-'+bookingId);
  if (btn) { btn.disabled = true; btn.textContent = 'Checking in…'; }
  try {
    await apiFetch('/checkin/'+bookingId, {method:'POST'});
    showToast('Check-in successful!','success');
    var row = document.getElementById('ci-row-'+bookingId);
    if (row) {
      row.cells[3].innerHTML = statusBadge('ACTIVE');
    }
  } catch(e){ showToast(e.message,'error'); if(btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-geo-alt-fill"></i> Check In';} }
}

/* ─── WAITING LIST ─── */
function renderWaitingList() {
  wlSelRoom = null; wlSelSlot = null;
  ca('<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-plus-circle"></i> Join a Queue</span></div>'
    +'<p style="font-size:13px;color:#64748b;margin-bottom:16px">Select an unavailable slot to join its waiting queue.</p>'
    +'<div class="two-panel">'
    +'<div><div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:10px">All Rooms</div><div id="wl-rooms"></div></div>'
    +'<div><div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:10px">Unavailable Slots</div><div id="wl-slots"><div class="empty-state" style="padding:20px"><i class="bi bi-arrow-left"></i><p>Select a room</p></div></div></div>'
    +'</div>'
    +'<div style="margin-top:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
    +'<span id="wl-info" style="font-size:13px;color:#64748b">No slot selected</span>'
    +'<button class="btn btn-primary" id="wl-join-btn" disabled onclick="doJoinQueue()"><i class="bi bi-person-plus"></i> Join Queue</button>'
    +'</div>'
    +'</div>'
    +'<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-list-ol"></i> Your Queue Positions</span>'
    +'<button class="btn btn-secondary btn-sm" onclick="loadMyQueue()"><i class="bi bi-arrow-clockwise"></i></button></div>'
    +'<div id="my-queue-body"></div></div>');
  loadRoomsForWL();
  loadMyQueue();
}

async function loadRoomsForWL() {
  try {
    var rooms = await apiFetch('/rooms');
    document.getElementById('wl-rooms').innerHTML = '<table><thead><tr><th>Name</th><th>Building</th></tr></thead><tbody>'
      + rooms.map(function(r){
          return '<tr onclick="selectRoomWL(\''+r.roomId+'\',\''+escHtml(r.name)+'\',this)" style="cursor:pointer"><td>'+escHtml(r.name)+'</td><td>'+escHtml(r.building)+'</td></tr>';
        }).join('') + '</tbody></table>';
  } catch(e){ document.getElementById('wl-rooms').innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>'; }
}

function selectRoomWL(roomId, roomName, row) {
  wlSelRoom = {id:roomId,name:roomName}; wlSelSlot = null;
  document.querySelectorAll('#wl-rooms tr').forEach(function(r){ r.classList.remove('selected'); });
  row.classList.add('selected');
  document.getElementById('wl-join-btn').disabled = true;
  document.getElementById('wl-info').textContent = 'No slot selected';
  loadSlotsForWL(roomId);
}

async function loadSlotsForWL(roomId) {
  document.getElementById('wl-slots').innerHTML = '<div style="text-align:center;padding:20px"><div style="width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div></div>';
  try {
    var slots = await apiFetch('/rooms/'+roomId+'/slots');
    var unavail = slots.filter(function(s){ return !s.isAvailable; });
    if (unavail.length === 0) {
      document.getElementById('wl-slots').innerHTML = '<div class="empty-state" style="padding:20px"><i class="bi bi-check-circle"></i><p>All slots available — no queue needed</p></div>'; return;
    }
    document.getElementById('wl-slots').innerHTML = '<table><thead><tr><th>Date</th><th>Start</th><th>End</th></tr></thead><tbody>'
      + unavail.map(function(s){
          return '<tr onclick="selectSlotWL(\''+s.slotId+'\',\''+s.startTime+'\',\''+s.endTime+'\',this)" style="cursor:pointer"><td>'+formatDate(s.startTime)+'</td><td>'+formatTime(s.startTime)+'</td><td>'+formatTime(s.endTime)+'</td></tr>';
        }).join('') + '</tbody></table>';
  } catch(e){ document.getElementById('wl-slots').innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>'; }
}

function selectSlotWL(slotId, start, end, row) {
  wlSelSlot = {id:slotId,start:start,end:end};
  document.querySelectorAll('#wl-slots tr').forEach(function(r){ r.classList.remove('selected'); });
  row.classList.add('selected');
  document.getElementById('wl-info').innerHTML = '<i class="bi bi-check-circle" style="color:#22c55e"></i> '+escHtml(wlSelRoom.name)+' · '+formatDateTime(start);
  document.getElementById('wl-join-btn').disabled = false;
}

async function doJoinQueue() {
  var btn = document.getElementById('wl-join-btn');
  btn.disabled = true; btn.textContent = 'Joining…';
  try {
    var result = await apiFetch('/queue/join', {method:'POST', body:JSON.stringify({roomId:wlSelRoom.id, slotId:wlSelSlot.id})});
    showToast('Joined queue at position '+result.position,'success');
    loadMyQueue();
    wlSelSlot = null; document.querySelectorAll('#wl-slots tr').forEach(function(r){ r.classList.remove('selected'); });
    document.getElementById('wl-info').textContent = 'No slot selected';
  } catch(e){ showToast(e.message,'error'); btn.disabled = false; }
  btn.innerHTML = '<i class="bi bi-person-plus"></i> Join Queue';
}

async function loadMyQueue() {
  var body = document.getElementById('my-queue-body');
  if (!body) return;
  try {
    var entries = await apiFetch('/queue');
    if (entries.length === 0) {
      body.innerHTML = '<div class="empty-state" style="padding:30px"><i class="bi bi-clock"></i><p>You are not in any queues</p></div>'; return;
    }
    body.innerHTML = '<div class="table-wrapper"><table><thead><tr><th>Room</th><th>Slot ID</th><th>Position</th><th>Priority Score</th></tr></thead><tbody>'
      + entries.map(function(e){
          return '<tr><td>'+escHtml(e.roomId)+'</td><td>'+escHtml(e.slotId.substring(0,8))+'…</td><td><strong>#'+e.position+'</strong></td><td>'+e.priorityScore.toFixed(1)+'</td></tr>';
        }).join('') + '</tbody></table></div>';
  } catch(ex){ if(body) body.innerHTML = '<div class="alert alert-danger">'+escHtml(ex.message)+'</div>'; }
}

/* ─── MY PENALTIES ─── */
async function renderMyPenalties() {
  ca('<div style="display:flex;align-items:center;justify-content:center;height:200px;"><div style="width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:#4f8ef7;border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>');
  try {
    var violations = await apiFetch('/penalties');
    var u = await apiFetch('/auth/me');
    var statusCard = u.isRestricted
      ? '<div class="result-card danger"><i class="bi bi-slash-circle"></i><div><div class="result-title">Account Restricted</div><div class="result-msg">You are currently restricted from making bookings.</div></div></div>'
      : '<div class="result-card success"><i class="bi bi-shield-check"></i><div><div class="result-title">Account in Good Standing</div><div class="result-msg">No active restrictions on your account.</div></div></div>';
    var vRows = violations.length === 0
      ? '<tr><td colspan="4"><div class="empty-state" style="padding:30px"><i class="bi bi-check-circle"></i><p>No violations on record</p></div></td></tr>'
      : violations.map(function(v){
          return '<tr><td>'+formatDateTime(v.occuredAt)+'</td><td>'+escHtml(v.violationType)+'</td><td style="color:#ef4444;font-weight:600">-'+v.penaltyApplied+'</td><td style="font-family:monospace;font-size:12px">'+escHtml(v.logId.substring(0,8))+'…</td></tr>';
        }).join('');
    ca('<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px">'
      +'<div class="card" style="display:flex;align-items:center;gap:20px">'
      +'<div>'+circularProgress(u.fairnessScore,100,100)+'</div>'
      +'<div><div style="font-size:14px;color:#64748b">Fairness Score</div>'
      +'<div style="font-size:32px;font-weight:800;color:#1e293b">'+Math.round(u.fairnessScore)+'</div>'
      +'<div style="font-size:12px;color:#94a3b8">out of 100 · '+u.noShowCount+' no-show(s)</div></div></div>'
      +'<div class="card" style="display:flex;flex-direction:column;justify-content:center">'+statusCard+'</div>'
      +'</div>'
      +'<div class="card"><div class="card-header"><span class="card-title">Violation History ('+violations.length+')</span></div>'
      +'<div class="table-wrapper"><table><thead><tr><th>Date</th><th>Type</th><th>Penalty</th><th>Reference</th></tr></thead>'
      +'<tbody>'+vRows+'</tbody></table></div></div>');
  } catch(e){ ca('<div class="alert alert-danger">'+escHtml(e.message)+'</div>'); }
}

function escHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
