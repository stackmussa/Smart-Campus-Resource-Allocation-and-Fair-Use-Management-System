<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SCRAFMS – Manager Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>SCRAFMS</h1>
      <p>Manager Portal</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-user">
        <div class="user-avatar" id="user-avatar">M</div>
        <div>
          <div style="font-size:14px;font-weight:600;" id="user-name"></div>
          <div style="font-size:11px;color:#64748b;" id="user-role-label">Manager</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Sign Out
        </button>
      </div>
    </header>
    <div class="content-area" id="content-area">
      <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading...</p></div>
    </div>
  </div>
</div>

<!-- Override modal -->
<div class="modal-overlay" id="override-modal" style="display:none;">
  <div class="modal">
    <div class="modal-title"><i class="bi bi-arrow-left-right" style="color:#4f8ef7;margin-right:8px;"></i>Override Booking</div>
    <input type="hidden" id="override-booking-id">
    <div class="form-group">
      <label class="form-label">Booking Details</label>
      <div id="override-booking-info" style="background:#f8fafc;padding:12px;border-radius:8px;font-size:13px;color:#374151;border:1px solid #e2e8f0;"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Override Reason <span style="color:#ef4444;">*</span></label>
      <textarea id="override-reason" class="form-control" rows="4" maxlength="500"
        placeholder="Explain why this booking needs to be overridden..." style="resize:vertical;"
        oninput="updateCharCount(this,'override-char-count',500)"></textarea>
      <div class="char-counter" id="override-char-count">0 / 500</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('override-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="submitOverride()">
        <i class="bi bi-arrow-left-right"></i> Confirm Override
      </button>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
var currentUser = null;
var currentPage = 'dashboard';
var selectedSlotId = null;

var NAV = [
  {id:'dashboard',        icon:'house',          label:'Dashboard'},
  {id:'register',         icon:'building-add',   label:'Register Resource'},
  {id:'override',         icon:'arrow-left-right',label:'Override Bookings'},
  {id:'queue',            icon:'list-ol',        label:'Queue Management'},
  {id:'penalties',        icon:'exclamation-triangle', label:'Penalty Dashboard'}
];

(async function init(){
  currentUser = await checkAuth(['MANAGER','ADMIN']);
  if (!currentUser) return;
  var initials = (currentUser.name||'M').split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent = currentUser.name || currentUser.email;
  if (currentUser.role === 'ADMIN') {
    document.getElementById('user-role-label').textContent = 'Admin';
    document.querySelector('.sidebar-logo p').textContent = 'Admin Portal';
  }
  buildNav();
  loadPage('dashboard');
})();

function buildNav() {
  var html = '';
  NAV.forEach(function(n){
    html += '<div class="nav-item" id="nav-'+n.id+'" onclick="loadPage(\''+n.id+'\')">' +
      '<i class="bi bi-'+n.icon+'"></i><span>'+n.label+'</span></div>';
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

function loadPage(id) {
  currentPage = id;
  selectedSlotId = null;
  NAV.forEach(function(n){
    var el = document.getElementById('nav-'+n.id);
    if (el) el.className = 'nav-item' + (n.id === id ? ' active' : '');
  });
  var titles = {dashboard:'Dashboard',register:'Register Resource',override:'Override Bookings',queue:'Queue Management',penalties:'Penalty Dashboard'};
  document.getElementById('topbar-title').textContent = titles[id] || id;
  document.getElementById('content-area').innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading...</p></div>';
  if (id === 'dashboard')  renderDashboard();
  else if (id === 'register')  renderRegisterResource();
  else if (id === 'override')  renderOverrideBookings();
  else if (id === 'queue')     renderQueueManagement();
  else if (id === 'penalties') renderPenaltyDashboard();
}

/* ── DASHBOARD ── */
async function renderDashboard() {
  var area = document.getElementById('content-area');
  try {
    var rooms = await apiFetch('/rooms');
    var bookings = await apiFetch('/override/bookings');
    var queue = await apiFetch('/queue');
    var penalties = await apiFetch('/penalties/all');

    var activeBookings = bookings.filter(function(b){return b.status==='CONFIRMED'||b.status==='ACTIVE';}).length;
    var queueDepth = Array.isArray(queue) ? queue.length : 0;
    var violations = Array.isArray(penalties) ? penalties.length : 0;

    area.innerHTML =
      '<div class="stats-grid">' +
        statCard('building','#4f8ef7','#eff6ff', rooms.length, 'Total Rooms') +
        statCard('calendar-check','#22c55e','#f0fdf4', activeBookings, 'Active Bookings') +
        statCard('list-ol','#f59e0b','#fffbeb', queueDepth, 'Queue Entries') +
        statCard('exclamation-triangle','#ef4444','#fef2f2', violations, 'Total Violations') +
      '</div>' +
      '<div class="card"><div class="card-header"><span class="card-title">Quick Actions</span></div>' +
      '<div class="quick-actions">' +
        qaCard('building-add','Register Room','register') +
        qaCard('arrow-left-right','Override Booking','override') +
        qaCard('list-ol','Manage Queue','queue') +
        qaCard('exclamation-triangle','View Penalties','penalties') +
      '</div></div>' +
      '<div class="card"><div class="card-header"><span class="card-title">Recent Bookings</span></div>' +
      '<div class="table-wrapper"><table><thead><tr>' +
        '<th>Student</th><th>Room</th><th>Start Time</th><th>End Time</th><th>Status</th>' +
      '</tr></thead><tbody>' +
      bookings.slice(0,10).map(function(b){
        return '<tr><td>'+escHtml(b.studentName||b.studentId)+'</td>' +
          '<td>'+escHtml(b.roomName||b.roomId)+'</td>' +
          '<td>'+formatDateTime(b.startTime)+'</td>' +
          '<td>'+formatDateTime(b.endTime)+'</td>' +
          '<td>'+statusBadge(b.status)+'</td></tr>';
      }).join('') +
      '</tbody></table></div></div>';
  } catch(e) {
    area.innerHTML = '<div class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> '+escHtml(e.message)+'</div>';
  }
}

function statCard(icon, color, bg, value, label) {
  return '<div class="stat-card"><div class="stat-icon" style="background:'+bg+';"><i class="bi bi-'+icon+'" style="font-size:22px;color:'+color+';"></i></div>' +
    '<div><div class="stat-value">'+value+'</div><div class="stat-label">'+label+'</div></div></div>';
}

function qaCard(icon, label, pageId) {
  return '<div class="quick-action-card" onclick="loadPage(\''+pageId+'\')"><i class="bi bi-'+icon+'"></i><span>'+label+'</span></div>';
}

/* ── REGISTER RESOURCE ── */
async function renderRegisterResource() {
  var area = document.getElementById('content-area');
  var slotsHtml = '';
  for (var i = 0; i < 3; i++) slotsHtml += slotRow(i);

  area.innerHTML =
    '<div class="two-panel">' +
    '<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-building-add" style="color:#4f8ef7;margin-right:6px;"></i>Register Study Room</span></div>' +
    '<div class="form-group"><label class="form-label">Room ID <span style="color:#ef4444;">*</span></label>' +
      '<input class="form-control" id="reg-room-id" placeholder="e.g. RM-101" maxlength="50"></div>' +
    '<div class="form-group"><label class="form-label">Room Name <span style="color:#ef4444;">*</span></label>' +
      '<input class="form-control" id="reg-room-name" placeholder="e.g. Study Room 101" maxlength="100"></div>' +
    '<div class="form-group"><label class="form-label">Building</label>' +
      '<input class="form-control" id="reg-building" placeholder="e.g. Main Library" maxlength="100"></div>' +
    '<div class="form-group"><label class="form-label">Location</label>' +
      '<input class="form-control" id="reg-location" placeholder="e.g. Floor 2, West Wing" maxlength="200"></div>' +
    '<div class="form-group"><label class="form-label">Capacity <span style="color:#ef4444;">*</span></label>' +
      '<input class="form-control" id="reg-capacity" type="number" min="1" max="100" placeholder="e.g. 8"></div>' +
    '<div class="form-group"><label class="form-label">Time Slots</label>' +
      '<div id="slots-container">'+slotsHtml+'</div>' +
      '<button class="btn btn-secondary btn-sm" onclick="addSlotRow()" style="margin-top:4px;">' +
        '<i class="bi bi-plus"></i> Add Slot</button></div>' +
    '<div id="reg-result"></div>' +
    '<button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="submitRegister()">' +
      '<i class="bi bi-check-lg"></i> Register Room</button></div>' +

    '<div class="card"><div class="card-header"><span class="card-title">Registered Rooms</span>' +
      '<button class="btn btn-secondary btn-sm" onclick="refreshRoomsList()"><i class="bi bi-arrow-clockwise"></i></button></div>' +
      '<div id="rooms-list"><div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading...</p></div></div>' +
    '</div></div>';

  loadRoomsList();
}

var slotCount = 3;
function slotRow(idx) {
  return '<div class="slot-row" id="slot-row-'+idx+'">' +
    '<div><label class="form-label" style="font-size:12px;">Start Time</label>' +
      '<input class="form-control" id="slot-start-'+idx+'" type="time"></div>' +
    '<div><label class="form-label" style="font-size:12px;">End Time</label>' +
      '<input class="form-control" id="slot-end-'+idx+'" type="time"></div>' +
    '<div style="padding-top:22px;"><button class="btn btn-secondary btn-sm" onclick="removeSlotRow('+idx+')">' +
      '<i class="bi bi-trash"></i></button></div>' +
    '</div>';
}

function addSlotRow() {
  var container = document.getElementById('slots-container');
  var div = document.createElement('div');
  div.innerHTML = slotRow(slotCount);
  container.appendChild(div.firstChild);
  slotCount++;
}

function removeSlotRow(idx) {
  var row = document.getElementById('slot-row-'+idx);
  if (row) row.remove();
}

async function loadRoomsList() {
  var el = document.getElementById('rooms-list');
  if (!el) return;
  try {
    var rooms = await apiFetch('/rooms');
    if (!rooms.length) { el.innerHTML = '<div class="empty-state"><i class="bi bi-building"></i><p>No rooms registered yet.</p></div>'; return; }
    el.innerHTML = '<div class="table-wrapper"><table><thead><tr>' +
      '<th>Room ID</th><th>Name</th><th>Building</th><th>Capacity</th><th>Status</th>' +
      '</tr></thead><tbody>' +
      rooms.map(function(r){
        return '<tr><td><code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;">'+escHtml(r.roomId)+'</code></td>' +
          '<td>'+escHtml(r.name||'')+'</td><td>'+escHtml(r.building||'—')+'</td>' +
          '<td>'+escHtml(String(r.capacity||''))+'</td>' +
          '<td>'+statusBadge(r.status||'AVAILABLE')+'</td></tr>';
      }).join('') +
      '</tbody></table></div>';
  } catch(e) {
    el.innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>';
  }
}

function refreshRoomsList() { loadRoomsList(); }

async function submitRegister() {
  var result = document.getElementById('reg-result');
  var roomId   = document.getElementById('reg-room-id').value.trim();
  var roomName = document.getElementById('reg-room-name').value.trim();
  var building = document.getElementById('reg-building').value.trim();
  var location = document.getElementById('reg-location').value.trim();
  var capacity = parseInt(document.getElementById('reg-capacity').value) || 0;

  if (!roomId || !roomName || capacity < 1) {
    result.innerHTML = '<div class="result-card danger"><i class="bi bi-x-circle-fill"></i><div><div class="result-title">Missing Fields</div><div class="result-msg">Room ID, Name, and Capacity are required.</div></div></div>';
    return;
  }

  var slots = [];
  document.querySelectorAll('[id^="slot-row-"]').forEach(function(row){
    var idx = row.id.replace('slot-row-','');
    var s = document.getElementById('slot-start-'+idx);
    var e = document.getElementById('slot-end-'+idx);
    if (s && e && s.value && e.value) slots.push({startTime: s.value, endTime: e.value});
  });

  try {
    await apiFetch('/rooms', {method:'POST', body:JSON.stringify({roomId, name:roomName, building, location, capacity, slots})});
    result.innerHTML = '<div class="result-card success"><i class="bi bi-check-circle-fill"></i><div><div class="result-title">Room Registered</div><div class="result-msg">'+escHtml(roomName)+' has been added to the system.</div></div></div>';
    showToast('Room registered successfully', 'success');
    loadRoomsList();
  } catch(e) {
    result.innerHTML = '<div class="result-card danger"><i class="bi bi-x-circle-fill"></i><div><div class="result-title">Registration Failed</div><div class="result-msg">'+escHtml(e.message)+'</div></div></div>';
  }
}

/* ── OVERRIDE BOOKINGS ── */
async function renderOverrideBookings() {
  var area = document.getElementById('content-area');
  area.innerHTML = '<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-arrow-left-right" style="color:#4f8ef7;margin-right:6px;"></i>All Bookings</span>' +
    '<button class="btn btn-secondary btn-sm" onclick="renderOverrideBookings()"><i class="bi bi-arrow-clockwise"></i> Refresh</button></div>' +
    '<div id="override-table-wrap"><div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading...</p></div></div></div>';
  try {
    var bookings = await apiFetch('/override/bookings');
    var wrap = document.getElementById('override-table-wrap');
    if (!bookings.length) { wrap.innerHTML = '<div class="empty-state"><i class="bi bi-calendar-x"></i><p>No bookings found.</p></div>'; return; }
    wrap.innerHTML = '<div class="table-wrapper"><table><thead><tr>' +
      '<th>Student</th><th>Room</th><th>Start Time</th><th>End Time</th><th>Status</th><th>Action</th>' +
      '</tr></thead><tbody>' +
      bookings.map(function(b){
        var canOverride = b.status === 'CONFIRMED' || b.status === 'ACTIVE' || b.status === 'PENDING';
        return '<tr><td>'+escHtml(b.studentName||b.studentId)+'</td>' +
          '<td>'+escHtml(b.roomName||b.roomId)+'</td>' +
          '<td>'+formatDateTime(b.startTime)+'</td>' +
          '<td>'+formatDateTime(b.endTime)+'</td>' +
          '<td>'+statusBadge(b.status)+'</td>' +
          '<td>'+(canOverride
            ? '<button class="btn btn-warning btn-sm" onclick="openOverrideModal(\''+escHtml(b.bookingId)+'\',\''+escHtml((b.studentName||b.studentId)+' / '+(b.roomName||b.roomId))+'\')"><i class="bi bi-arrow-left-right"></i> Override</button>'
            : '<span style="color:#94a3b8;font-size:12px;">N/A</span>') +
          '</td></tr>';
      }).join('') +
      '</tbody></table></div>';
  } catch(e) {
    document.getElementById('override-table-wrap').innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>';
  }
}

function openOverrideModal(bookingId, info) {
  document.getElementById('override-booking-id').value = bookingId;
  document.getElementById('override-booking-info').textContent = info;
  document.getElementById('override-reason').value = '';
  document.getElementById('override-char-count').textContent = '0 / 500';
  document.getElementById('override-char-count').className = 'char-counter';
  document.getElementById('override-modal').style.display = 'flex';
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

async function submitOverride() {
  var bookingId = document.getElementById('override-booking-id').value;
  var reason = document.getElementById('override-reason').value.trim();
  if (!reason) { showToast('Please provide an override reason.', 'error'); return; }
  try {
    await apiFetch('/override', {method:'POST', body:JSON.stringify({bookingId, reason})});
    closeModal('override-modal');
    showToast('Booking overridden successfully', 'success');
    renderOverrideBookings();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

/* ── QUEUE MANAGEMENT ── */
async function renderQueueManagement() {
  var area = document.getElementById('content-area');
  area.innerHTML =
    '<div class="two-panel">' +
    '<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-grid" style="color:#4f8ef7;margin-right:6px;"></i>Rooms & Slots</span></div>' +
      '<div id="slots-panel"><div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading...</p></div></div></div>' +
    '<div class="card"><div class="card-header"><span class="card-title" id="queue-panel-title">Queue Entries</span>' +
      '<button class="btn btn-success btn-sm" id="process-btn" onclick="processQueue()" disabled><i class="bi bi-play-fill"></i> Process Queue</button></div>' +
      '<div id="queue-panel"><div class="empty-state"><i class="bi bi-mouse-fill"></i><p>Select a slot to view its queue.</p></div></div></div>' +
    '</div>';
  loadSlotsPanel();
}

async function loadSlotsPanel() {
  var el = document.getElementById('slots-panel');
  if (!el) return;
  try {
    var rooms = await apiFetch('/rooms');
    var allSlots = [];
    for (var i = 0; i < rooms.length; i++) {
      try {
        var slots = await apiFetch('/rooms/'+rooms[i].roomId+'/slots');
        slots.forEach(function(s){ s._roomName = rooms[i].name || rooms[i].roomId; allSlots.push(s); });
      } catch(e2){}
    }
    if (!allSlots.length) { el.innerHTML = '<div class="empty-state"><i class="bi bi-building"></i><p>No slots found.</p></div>'; return; }
    var queueEntries = [];
    try { queueEntries = await apiFetch('/queue'); } catch(e2){}
    var depthMap = {};
    queueEntries.forEach(function(e){ depthMap[e.slotId] = (depthMap[e.slotId]||0)+1; });
    el.innerHTML = '<div class="table-wrapper"><table><thead><tr>' +
      '<th>Room</th><th>Start</th><th>End</th><th>Status</th><th>Queue</th>' +
      '</tr></thead><tbody>' +
      allSlots.map(function(s){
        var depth = depthMap[s.slotId]||0;
        return '<tr style="cursor:pointer;" onclick="selectSlot(\''+escHtml(s.slotId)+'\',\''+escHtml(s._roomName)+' '+formatTime(s.startTime)+'\')">'+
          '<td>'+escHtml(s._roomName)+'</td>' +
          '<td>'+formatTime(s.startTime)+'</td>' +
          '<td>'+formatTime(s.endTime)+'</td>' +
          '<td>'+statusBadge(s.status||'AVAILABLE')+'</td>' +
          '<td>'+(depth>0?'<span style="background:#3b82f6;color:white;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600;">'+depth+'</span>':'<span style="color:#94a3b8;">0</span>')+'</td></tr>';
      }).join('') +
      '</tbody></table></div>';
  } catch(e) {
    el.innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>';
  }
}

async function selectSlot(slotId, label) {
  selectedSlotId = slotId;
  document.getElementById('queue-panel-title').textContent = 'Queue — '+label;
  var btn = document.getElementById('process-btn');
  if (btn) btn.disabled = false;
  var el = document.getElementById('queue-panel');
  el.innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading queue...</p></div>';
  try {
    var entries = await apiFetch('/queue');
    var filtered = entries.filter(function(e){ return e.slotId === slotId; });
    if (!filtered.length) { el.innerHTML = '<div class="empty-state"><i class="bi bi-list-ol"></i><p>No queue entries for this slot.</p></div>'; return; }
    el.innerHTML = '<div class="table-wrapper"><table><thead><tr>' +
      '<th>Position</th><th>Student</th><th>Room</th><th>Time</th><th>Priority Score</th><th>Joined At</th>' +
      '</tr></thead><tbody>' +
      filtered.sort(function(a,b){return a.position-b.position;})
        .map(function(e){
          return '<tr>' +
            '<td><strong>#'+e.position+'</strong></td>' +
            '<td>'+escHtml(e.studentName||e.studentId)+'</td>' +
            '<td>'+escHtml(e.roomName||e.roomId||'')+'</td>' +
            '<td>'+formatDateTime(e.startTime)+'</td>' +
            '<td><strong>'+e.priorityScore+'</strong></td>' +
            '<td>'+formatDateTime(e.requestedAt)+'</td></tr>';
        }).join('') +
      '</tbody></table></div>';
  } catch(e) {
    el.innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>';
  }
}

async function processQueue() {
  if (!selectedSlotId) return;
  try {
    var result = await apiFetch('/queue/process/'+selectedSlotId, {method:'POST'});
    showToast('Queue processed. Booking ID: '+(result.bookingId||result), 'success');
    selectSlot(selectedSlotId, document.getElementById('queue-panel-title').textContent.replace('Queue — ',''));
  } catch(e) {
    showToast(e.message, 'error');
  }
}

/* ── PENALTY DASHBOARD ── */
async function renderPenaltyDashboard() {
  var area = document.getElementById('content-area');
  area.innerHTML = '<div class="card"><div class="card-header"><span class="card-title"><i class="bi bi-exclamation-triangle" style="color:#ef4444;margin-right:6px;"></i>All Violations</span>' +
    '<button class="btn btn-secondary btn-sm" onclick="renderPenaltyDashboard()"><i class="bi bi-arrow-clockwise"></i> Refresh</button></div>' +
    '<div id="penalty-table-wrap"><div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Loading...</p></div></div></div>';
  try {
    var penalties = await apiFetch('/penalties/all');
    var wrap = document.getElementById('penalty-table-wrap');
    if (!penalties.length) { wrap.innerHTML = '<div class="empty-state"><i class="bi bi-shield-check"></i><p>No violations recorded.</p></div>'; return; }
    wrap.innerHTML = '<div class="table-wrapper"><table><thead><tr>' +
      '<th>Student</th><th>Violation Type</th><th>Date</th><th>Penalty Score</th><th>No-Shows</th><th>Restricted</th>' +
      '</tr></thead><tbody>' +
      penalties.map(function(p){
        return '<tr><td>'+escHtml(p.studentName||p.studentId)+'</td>' +
          '<td>'+escHtml(p.violationType||'')+'</td>' +
          '<td>'+formatDateTime(p.occuredAt)+'</td>' +
          '<td><strong style="color:#ef4444;">'+p.penaltyApplied+'</strong></td>' +
          '<td>'+p.noShowCount+'</td>' +
          '<td>'+(p.isRestricted
            ? '<span style="background:#ef4444;color:white;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600;">YES</span>'
            : '<span style="background:#22c55e;color:white;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600;">NO</span>') +
          '</td></tr>';
      }).join('') +
      '</tbody></table></div>';
  } catch(e) {
    document.getElementById('penalty-table-wrap').innerHTML = '<div class="alert alert-danger">'+escHtml(e.message)+'</div>';
  }
}

/* ── Helpers ── */
function updateCharCount(el, counterId, max) {
  var counter = document.getElementById(counterId);
  if (!counter) return;
  var len = el.value.length;
  counter.textContent = len + ' / ' + max;
  counter.className = 'char-counter' + (len > max * 0.9 ? ' warn' : '');
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
